<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Galerie Média Triée</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; padding: 30px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        .media-card {
            background: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .media-card:hover { transform: translateY(-5px); }
        
        /* Conteneur pour garder un ratio propre */
        .media-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .media-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Remplit le cadre, vous pouvez mettre 'contain' */
        }

        .media-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .info { padding: 15px; }
        .info h3 { font-size: 0.9rem; margin: 0; color: #e0e0e0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .badge {
            display: inline-block;
            padding: 3px 8px;
            font-size: 0.7rem;
            border-radius: 4px;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .badge-photo { background: #3498db; }
        .badge-video { background: #e74c3c; }

        .loading { text-align: center; padding: 50px; font-size: 1.2rem; color: #888; }
    </style>
</head>
<body>

    <h1>Galerie Photo & Vidéo</h1>
    <div id="loader" class="loading">Récupération des médias et conversion Base64 en cours...</div>
    <div class="grid" id="gallery"></div>

    <script>
        const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbywxxxaIK1InIRGEUVfhJyRXpuwlFYM6zJJPStMwbqcYaQybr1SVylKNHSh3UauNnht/exec';

        async function loadGallery() {
            try {
                const response = await fetch(APP_SCRIPT_URL);
                const items = await response.json();
                
                const gallery = document.getElementById('gallery');
                const loader = document.getElementById('loader');
                
                if (items.length === 0) {
                    loader.innerText = "Le dossier est vide.";
                    return;
                }

                loader.style.display = 'none';

                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'media-card';
                    
                    let mediaHTML = '';
                    if (item.type === 'photo') {
                        // Utilisation du Base64 directement dans le src
                        mediaHTML = `<img src="${item.data}" alt="${item.name}">`;
                    } else {
                        // Utilisation de l'Iframe pour les vidéos
                        mediaHTML = `<iframe src="https://drive.google.com/file/d/${item.id}/preview"></iframe>`;
                    }

                    card.innerHTML = `
                        <div class="media-container">${mediaHTML}</div>
                        <div class="info">
                            <span class="badge badge-${item.type}">${item.type}</span>
                            <h3>${item.name}</h3>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
            } catch (error) {
                console.error(error);
                document.getElementById('loader').innerText = "Erreur lors de la récupération des données.";
            }
        }

        loadGallery();
    </script>
</body>
</html>
