<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Podcast | Méthode Base64</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .player-card { background: #1e293b; padding: 30px; border-radius: 20px; width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status { font-size: 0.8rem; color: #38bdf8; margin-bottom: 20px; font-style: italic; }
        .play-btn { 
            background: #38bdf8; border: none; width: 60px; height: 60px; 
            border-radius: 50%; color: white; font-size: 1.5rem; cursor: pointer;
            display: none; margin: 0 auto;
        }
        /* Animation de chargement */
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #38bdf8;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="player-card">
        <h2 id="title">Chargement du podcast...</h2>
        <div id="loading-zone">
            <div class="loader"></div>
            <p class="status" id="status-msg">Conversion de l'audio par le serveur Google...</p>
        </div>
        
        <button id="btn-play" class="play-btn">▶</button>
        <audio id="audio-element"></audio>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzxBzPoBJgJ_Jyrv7DfdXaOJ9LROIxiIcPbCIA6nsPI1rqyrJbuoADTNcFYqNd8wKpz/exec';

        async function fetchAudio() {
            const statusMsg = document.getElementById('status-msg');
            const btn = document.getElementById('btn-play');
            const audio = document.getElementById('audio-element');
            const title = document.getElementById('title');
            const loadingZone = document.getElementById('loading-zone');

            try {
                // 1. On appelle Apps Script
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();

                if(data.error) throw new Error(data.error);

                // 2. On injecte le Base64 dans la source de l'audio
                audio.src = data.base64;
                title.innerText = data.name;
                
                // 3. On cache le loader et on montre le bouton
                loadingZone.style.display = 'none';
                btn.style.display = 'block';
                
                console.log("Audio chargé avec succès en Base64 !");

            } catch (err) {
                statusMsg.innerText = "Erreur : " + err.message;
                statusMsg.style.color = "#ef4444";
                console.error(err);
            }
        }

        document.getElementById('btn-play').onclick = function() {
            const audio = document.getElementById('audio-element');
            if (audio.paused) {
                audio.play();
                this.innerText = '⏸';
            } else {
                audio.pause();
                this.innerText = '▶';
            }
        };

        fetchAudio();
    </script>
</body>
</html>
