<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ma Galerie Pro | Chargement Dynamique</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; text-align: center; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .media-card {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .media-container { aspect-ratio: 16/9; background: #000; display: flex; align-items: center; }
        .media-container img { width: 100%; height: 100%; object-fit: cover; }
        .media-container iframe { width: 100%; height: 100%; border: none; }

        .info { padding: 10px; font-size: 0.85rem; text-align: left; }

        /* Le Bouton de chargement */
        #load-more-container { margin: 40px 0; }
        .btn-load {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.3s;
        }
        .btn-load:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .loader-dots { display: none; margin: 20px auto; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>Ma Galerie Multimédia</h1>
    <p id="stats">Chargement de la bibliothèque...</p>

    <div class="grid" id="gallery"></div>

    <div id="load-more-container">
        <div id="loader" class="loader-dots">Chargement de la grappe suivante...</div>
        <button id="btn-next" class="btn-load" onclick="loadNextBatch()">Voir plus de médias</button>
        <p id="end-message" class="hidden">✨ Vous avez atteint la fin de la galerie.</p>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbywxxxaIK1InIRGEUVfhJyRXpuwlFYM6zJJPStMwbqcYaQybr1SVylKNHSh3UauNnht/exec';
        let currentToken = null; // Stocke le jeton pour la prochaine requête
        let isFull = false;

        async function loadNextBatch() {
            const btn = document.getElementById('btn-next');
            const loader = document.getElementById('loader');
            const gallery = document.getElementById('gallery');

            // 1. Préparation de l'interface
            btn.classList.add('hidden');
            loader.style.display = 'block';

            try {
                // 2. Appel à Apps Script avec le token (si présent)
                let url = SCRIPT_URL;
                if (currentToken) {
                    url += `?token=${encodeURIComponent(currentToken)}`;
                }

                const response = await fetch(url);
                const data = await response.json();

                // 3. Affichage des items reçus
                data.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'media-card';
                    
                    let content = '';
                    if(item.type === 'photo') {
                        content = `<img src="${item.data}" loading="lazy">`;
                    } else {
                        content = `<iframe src="https://drive.google.com/file/d/${item.id}/preview"></iframe>`;
                    }

                    card.innerHTML = `
                        <div class="media-container">${content}</div>
                        <div class="info"><strong>${item.name}</strong></div>
                    `;
                    gallery.appendChild(card);
                });

                // 4. Gestion du jeton pour la suite
                currentToken = data.nextStateToken;
                
                if (!currentToken) {
                    // Plus rien à charger
                    btn.style.display = 'none';
                    document.getElementById('end-message').classList.remove('hidden');
                } else {
                    btn.classList.remove('hidden');
                }

                document.getElementById('stats').innerText = `${gallery.children.length} médias affichés`;

            } catch (error) {
                console.error("Erreur de chargement:", error);
                alert("Oups, une erreur est survenue lors du chargement de la grappe.");
            } finally {
                loader.style.display = 'none';
            }
        }

        // Chargement de la première grappe au démarrage
        loadNextBatch();
    </script>
</body>
</html>
