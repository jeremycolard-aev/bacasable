<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ma Galerie Vidéo Drive</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .video-card {
            background: #333;
            padding: 10px;
            border-radius: 10px;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
        }
        .video-wrapper iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }
        h3 { font-size: 1rem; margin: 10px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .loading { text-align: center; font-style: italic; color: #888; }
    </style>
</head>
<body>

    <h1>Ma Galerie Vidéo</h1>
    <div id="loader" class="loading">Chargement des vidéos depuis Google Drive...</div>
    <div class="grid" id="video-grid"></div>

    <script>
        // REMPLACEZ PAR VOTRE URL APPS SCRIPT
        const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbywxxxaIK1InIRGEUVfhJyRXpuwlFYM6zJJPStMwbqcYaQybr1SVylKNHSh3UauNnht/exec';

        async function loadVideos() {
            try {
                const response = await fetch(APP_SCRIPT_URL);
                const videos = await response.json();
                
                const grid = document.getElementById('video-grid');
                const loader = document.getElementById('loader');
                
                if (videos.length === 0) {
                    loader.innerText = "Aucune vidéo trouvée.";
                    return;
                }

                loader.style.display = 'none';

                videos.forEach(video => {
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.innerHTML = `
                        <div class="video-wrapper">
                            <iframe src="https://drive.google.com/file/d/${video.id}/preview"></iframe>
                        </div>
                        <h3>${video.name}</h3>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error("Erreur:", error);
                document.getElementById('loader').innerText = "Erreur lors du chargement.";
            }
        }

        loadVideos();
    </script>
</body>
</html>
